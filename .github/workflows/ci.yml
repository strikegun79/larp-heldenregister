name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  test:
    name: Tests & Lint
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: larp_heldenregister_laravel_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: PHP einrichten
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, pdo, pdo_mysql, xml, bcmath, gd, intl, zip
          coverage: none

      - name: Composer-Cache
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: PHP-Abhängigkeiten installieren
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: npm-Abhängigkeiten installieren & Assets bauen
        run: |
          npm ci
          npm run build

      - name: .env für Tests anlegen
        run: |
          cp .env.example .env
          sed -i 's|APP_ENV=production|APP_ENV=testing|' .env
          sed -i 's|APP_DEBUG=false|APP_DEBUG=true|' .env
          sed -i 's|APP_URL=.*|APP_URL=http://localhost|' .env
          sed -i 's|DB_HOST=.*|DB_HOST=127.0.0.1|' .env
          sed -i 's|DB_PORT=.*|DB_PORT=3306|' .env
          sed -i 's|DB_DATABASE=.*|DB_DATABASE=larp_heldenregister_laravel_test|' .env
          sed -i 's|DB_USERNAME=.*|DB_USERNAME=root|' .env
          sed -i 's|DB_PASSWORD=.*|DB_PASSWORD=root|' .env
          php artisan key:generate

      - name: Datenbank migrieren
        run: php artisan migrate --force

      - name: Pint (Code-Style)
        run: ./vendor/bin/pint --test

      - name: PHPUnit-Tests
        run: php artisan test --stop-on-failure
